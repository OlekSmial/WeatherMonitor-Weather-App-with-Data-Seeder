services:
  mongodb:
    image: mongo:latest
    container_name: weather_db
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASS}
    volumes:
      - mongo_data:/data/db

  app:
    build: .
    container_name: weather_app
    ports:
      - "5000:5000"
    depends_on:
      - mongodb
    env_file:
      - .env

volumes:
  mongo_data:


